{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block script %}
<script src="{{ url_for('static', filename='js/home.js') }}" defer></script>
{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
    <h2 style="margin-bottom: 0;">Recommended for you</h2>
    <button id="refresh-recommendations-btn" style="padding: 6px 14px; border-radius: 999px; background: var(--bg-elev-3); border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 0.9rem; transition: background 0.2s;">
        Refresh ↻
    </button>
</div>

<div id="recommendations" class="card-grid">
    <p>Loading AI recommendations...</p>
</div>
{% endblock %}
